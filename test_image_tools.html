<!DOCTYPE html>
<html><body>
<script>
async function runTests(){
  console.log("Starting image tool simulated test");
  try{
    // Create a 100x100 dummy red image blob
    const cv=document.createElement('canvas'); cv.width=100; cv.height=100;
    const ctx=cv.getContext('2d'); ctx.fillStyle='red'; ctx.fillRect(0,0,100,100);
    const blob=await new Promise(r=>cv.toBlob(r, 'image/jpeg'));
    blob.name = "test.jpg";
    console.log("Blob created, size:", blob.size);
    document.body.innerHTML += "<h2>All good!</h2>";
  }catch(e){
    console.error(e);
    document.body.innerHTML += "<h2>Error!</h2>";
  }
}
runTests();
</script>
<script src="nav-enhancements.js"></script>
<script src="site-enhancements.js"></script>
</body></html>
